<style>
  :root {
    --ground: #FDF9F3;
    --card: #FFFFFF;
    --ink: #453A4E;
    --ink-soft: #8A7E93;
    --sage: #7FB6A4;
    --sage-deep: #4E8A76;
    --sage-tint: #EAF4F0;
    --peach: #F0A184;
    --peach-deep: #D97D5C;
    --peach-tint: #FDEFE8;
    --butter: #F3D9A8;
    --line: #EDE4D8;
    --radius: 18px;
    --display: ui-rounded, "SF Pro Rounded", "Nunito", system-ui, sans-serif;
    --body: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  html { background: var(--ground); }
  body {
    font-family: var(--body);
    color: var(--ink);
    background:
      radial-gradient(circle at 12% 0%, rgba(243,217,168,.35), transparent 34%),
      radial-gradient(circle at 88% 4%, rgba(127,182,164,.22), transparent 30%),
      var(--ground);
    min-height: 100vh;
  }
  .wrap { max-width: 880px; margin: 0 auto; padding: 48px 20px 80px; }

  header { text-align: center; margin-bottom: 34px; }
  .eyebrow {
    font-size: 12px; letter-spacing: .18em; text-transform: uppercase;
    color: var(--peach-deep); font-weight: 700;
  }
  h1 {
    font-family: var(--display);
    font-size: clamp(30px, 5.5vw, 42px);
    font-weight: 800;
    margin: 8px 0 6px;
    text-wrap: balance;
  }
  .sub { color: var(--ink-soft); font-size: 15px; max-width: 46ch; margin: 0 auto; line-height: 1.5; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 14px 18px;
    display: flex; flex-direction: column; gap: 10px;
    box-shadow: 0 2px 10px rgba(69,58,78,.05);
    position: relative;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(69,58,78,.08); }
  .card.claimed { background: var(--sage-tint); border-color: #D3E7DF; }

  .thumb {
    aspect-ratio: 16 / 10;
    border-radius: 12px;
    overflow: hidden;
    background: var(--peach-tint);
    position: relative;
    display: grid; place-items: center;
  }
  .thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; background: #FFFFFF; }
  .thumb svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .thumb .fallback { font-size: 44px; }
  .card.claimed .thumb { opacity: .85; }

  .card-body { display: flex; flex-direction: column; gap: 8px; padding: 0 4px; flex: 1; }
  .card h3 { font-family: var(--display); font-size: 17px; font-weight: 700; margin: 0; line-height: 1.25; }
  .price { font-size: 13px; font-weight: 700; color: var(--ink-soft); font-variant-numeric: tabular-nums; }
  .note { font-size: 13px; color: var(--ink-soft); line-height: 1.45; margin: 0; }
  .item-link { font-size: 13px; font-weight: 600; color: var(--peach-deep); text-decoration: none; }
  .item-link:hover, .item-link:focus-visible { text-decoration: underline; }

  .claim-btn {
    margin-top: auto;
    font-family: var(--display);
    font-size: 14px; font-weight: 700;
    border: none; border-radius: 999px;
    padding: 10px 16px;
    background: var(--peach); color: #FFFFFF;
    cursor: pointer;
    transition: background .15s ease;
  }
  .claim-btn:hover { background: var(--peach-deep); }
  .claim-btn:focus-visible, .ghost-btn:focus-visible, .add-open:focus-visible, input:focus-visible {
    outline: 3px solid var(--butter); outline-offset: 2px;
  }

  .claim-form { display: flex; gap: 8px; margin-top: auto; }
  .claim-form input {
    flex: 1; min-width: 0;
    border: 1.5px solid var(--line); border-radius: 999px;
    padding: 9px 14px; font-size: 14px; font-family: var(--body);
    background: #fff; color: var(--ink);
  }
  .claim-form button {
    border: none; border-radius: 999px; padding: 9px 14px;
    font-weight: 700; font-size: 14px; cursor: pointer;
    background: var(--sage-deep); color: #fff; font-family: var(--display);
  }

  .claimed-tag {
    margin-top: auto;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    background: #FFFFFF; border: 1.5px solid #CBE3D9;
    border-radius: 999px; padding: 8px 8px 8px 14px;
    font-size: 13.5px; font-weight: 700; color: var(--sage-deep);
  }
  .claimed-tag .who { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .claimed-tag.other { color: var(--ink-soft); border-color: var(--line); justify-content: center; padding: 8px 14px; }
  .ghost-btn {
    border: none; background: transparent; color: var(--ink-soft);
    font-size: 12px; font-weight: 600; cursor: pointer; padding: 4px 8px; border-radius: 999px;
  }
  .ghost-btn:hover { color: var(--peach-deep); background: var(--peach-tint); }

  .remove-btn {
    position: absolute; top: 20px; right: 20px;
    border: none; background: rgba(255,255,255,.85); color: #A796B3;
    font-size: 15px; line-height: 1; cursor: pointer;
    padding: 5px 8px; border-radius: 8px;
  }
  .remove-btn:hover { color: var(--peach-deep); background: #fff; }

  .add-card {
    border: 2px dashed #E3D5C3; border-radius: var(--radius);
    background: transparent; box-shadow: none;
    display: flex; flex-direction: column; justify-content: center;
    padding: 20px; gap: 12px; min-height: 220px;
  }
  .add-open {
    font-family: var(--display); font-weight: 700; font-size: 15px;
    color: var(--peach-deep); background: transparent; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    padding: 20px 10px;
  }
  .add-open .plus {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--peach-tint); color: var(--peach-deep);
    font-size: 24px; display: grid; place-items: center; font-weight: 400;
  }
  .add-form { display: none; flex-direction: column; gap: 10px; }
  .add-form.open { display: flex; }
  .add-card.editing .add-open { display: none; }
  .add-form label { font-size: 12px; font-weight: 700; color: var(--ink-soft); letter-spacing: .06em; text-transform: uppercase; }
  .add-form input {
    border: 1.5px solid var(--line); border-radius: 12px;
    padding: 10px 12px; font-size: 14px; font-family: var(--body);
    background: #fff; color: var(--ink); width: 100%; box-sizing: border-box;
  }
  .add-actions { display: flex; gap: 8px; margin-top: 4px; }
  .add-actions .save {
    flex: 1; border: none; border-radius: 999px; padding: 10px;
    background: var(--sage-deep); color: #fff; font-weight: 700; font-family: var(--display);
    font-size: 14px; cursor: pointer;
  }
  .add-actions .cancel {
    border: none; border-radius: 999px; padding: 10px 14px;
    background: transparent; color: var(--ink-soft); font-weight: 600; font-size: 14px; cursor: pointer;
  }
  .add-actions .cancel:hover { background: var(--peach-tint); color: var(--peach-deep); }

  .sync-note { margin-top: 10px; font-size: 12.5px; font-weight: 600; color: var(--sage-deep); }
  .sync-note.err { color: var(--peach-deep); }


  /* --- Hatching egg beside the title (loops forever) --- */
  .hatch-inline { display: inline-block; width: 54px; height: 62px; vertical-align: -14px; margin-right: 8px; }
  .hatch-egg { transform-box: view-box; transform-origin: 100px 200px; animation: loop-egg 6s ease-in-out infinite; }
  .hatch-crack { stroke-dasharray: 220; animation: loop-crack 6s linear infinite; }
  .hatch-top { transform-box: view-box; transform-origin: 100px 100px; animation: loop-top 6s ease-in-out infinite; }
  .hatch-bottom { animation: loop-bottom 6s ease-in-out infinite; }
  .hatch-chick { animation: loop-chick 6s ease-in-out infinite; }
  @keyframes loop-egg {
    0%, 6% { transform: rotate(0); opacity: 1; }
    10%   { transform: rotate(-6deg); }
    13.5% { transform: rotate(5deg); }
    17%   { transform: rotate(-4deg); }
    20.5% { transform: rotate(3deg); }
    24%   { transform: rotate(-2deg); }
    28.5% { transform: rotate(0); opacity: 1; }
    28.7%, 90% { opacity: 0; transform: rotate(0); }
    97%, 100% { opacity: 1; transform: rotate(0); }
  }
  @keyframes loop-crack {
    0%, 20% { stroke-dashoffset: 220; }
    28.4%, 88% { stroke-dashoffset: 0; }
    88.1%, 100% { stroke-dashoffset: 220; }
  }
  @keyframes loop-top {
    0%, 28.6% { opacity: 0; transform: none; }
    28.7%, 30% { opacity: 1; transform: none; }
    36% { opacity: 1; }
    43%, 100% { opacity: 0; transform: translate(-40px, -96px) rotate(-26deg); }
  }
  @keyframes loop-bottom {
    0%, 28.6% { opacity: 0; }
    28.7%, 86% { opacity: 1; }
    92%, 100% { opacity: 0; }
  }
  @keyframes loop-chick {
    0%, 31.5% { opacity: 0; transform: translateY(42px); }
    40.5% { opacity: 1; transform: translateY(0); }
    46%   { transform: translateY(0); }
    49.5% { transform: translateY(-8px); }
    53%   { transform: translateY(0); }
    60%   { transform: translateY(0); }
    63%   { transform: translateY(-6px); }
    66%, 84% { transform: translateY(0); opacity: 1; }
    92%, 100% { opacity: 0; transform: translateY(42px); }
  }
  @media (prefers-reduced-motion: reduce) {
    .hatch-egg, .hatch-crack, .hatch-top, .hatch-bottom, .hatch-chick { animation: none; }
    .hatch-egg, .hatch-top { opacity: 0; }
    .hatch-bottom { opacity: 1; }
    .hatch-chick { opacity: 1; transform: translateY(0); }
  }


  footer { text-align: center; margin-top: 40px; font-size: 12.5px; color: var(--ink-soft); }

  @media (prefers-reduced-motion: reduce) {
    .card { transition: none; }
  }
</style>

  }
  let isHost = false;
  try { isHost = localStorage.getItem(HOST_FLAG) === '1'; } catch (e) {}
  if (isHost) document.getElementById('hostHint').hidden = false;
  window.addEventListener('hashchange', () => location.reload());

  const syncNote = document.createElement('div');
  syncNote.className = 'sync-note';
  document.querySelector('header').appendChild(syncNote);
  function updateSyncNote() {
    if (!syncOn) { syncNote.textContent = ''; return; }
    syncNote.textContent = syncError
      ? 'Connection lost, showing the last known state. Retrying…'
      : '';
    syncNote.classList.toggle('err', syncError);
  }

  function api(path, opts) {
    opts = opts || {};
    opts.headers = Object.assign({
      'apikey': SYNC_KEY,
      'Authorization': 'Bearer ' + SYNC_KEY,
      'Content-Type': 'application/json'
    }, opts.headers || {});
    return fetch(SYNC_URL + '/rest/v1/' + path, opts).then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text().then(t => t ? JSON.parse(t) : null);
    });
  }

  async function loadRemote() {
    const [rows, claims] = await Promise.all([
      api('gift_items?select=*&order=position.asc,id.asc'),
      api('gift_claims?select=item_id')
    ]);
    const claimedSet = new Set(claims.map(c => c.item_id));
    items = rows.map(r => ({
      id: r.id, name: r.name, price: r.price || '', link: r.link || '',
      note: r.note || '', img: r.img || '', art: '',
      claimed: claimedSet.has(r.id), claimedBy: myClaims[r.id] || ''
    }));
  }

  async function refresh() {
    if (!syncOn) { render(); return; }
    try { await loadRemote(); syncError = false; }
    catch (e) { syncError = true; }
    // Don't re-render over a form the user is typing in
    if (claimingId === null && !addFormOpen) render();
    else updateSyncNote();
  }

  async function doClaim(id, guest) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    claimingId = null;
    if (!syncOn) { item.claimedBy = guest; save(); render(); return; }
    try {
      await api('gift_claims', {
        method: 'POST',
        body: JSON.stringify([{ item_id: id, claimed_by: guest }])
      });
      myClaims[id] = guest; saveMy();
      item.claimed = true; item.claimedBy = guest;
      render();
    } catch (e) {
      if (String(e.message).indexOf('409') !== -1) {
        alert('Oh! Someone reserved this gift just before you. Pick another one?');
      } else {
        alert("Your claim couldn't be saved. Please check your connection and try again.");
      }
      await refresh();
    }
  }

  async function doUnclaim(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    if (!syncOn) { item.claimedBy = ''; save(); render(); return; }
    try {
      await api('gift_claims?item_id=eq.' + id, { method: 'DELETE' });
      delete myClaims[id]; saveMy();
      item.claimed = false; item.claimedBy = '';
      render();
    } catch (e) {
      alert("Couldn't free the gift up. Please check your connection and try again.");
      await refresh();
    }
  }

  async function doAdd(fields) {
    if (!syncOn) {
      fields.id = Date.now();
      items.push(fields);
      save(); render();
      return;
    }
    try {
      await api('gift_items', {
        method: 'POST',
        headers: { 'Prefer': 'return=representation' },
        body: JSON.stringify([{
          name: fields.name, price: fields.price, link: fields.link,
          note: fields.note, img: fields.img,
          position: items.length ? Math.max(...items.map(i => i.id)) + 1 : 1
        }])
      });
      await refresh();
    } catch (e) {
      alert("The article couldn't be added. Please check your connection and try again.");
    }
  }

  async function doRemove(id) {
    if (!syncOn) {
      items = items.filter(i => i.id !== id);
      save(); render();
      return;
    }
    try {
      await api('gift_claims?item_id=eq.' + id, { method: 'DELETE' });
      await api('gift_items?id=eq.' + id, { method: 'DELETE' });
      await refresh();
    } catch (e) {
      alert("The article couldn't be removed. Please check your connection and try again.");
    }
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function thumbHtml(item) {
    if (item.img && /^(https?:\/\/|data:image\/)/i.test(item.img)) {
      return '<div class="thumb"><img src="' + esc(item.img) + '" alt="' + esc(item.name) + '" ' +
             'onerror="this.parentNode.innerHTML=\'<span class=&quot;fallback&quot;>\u{1F381}</span>\'"></div>';
    }
    if (item.art && ART[item.art]) {
      return '<div class="thumb">' + ART[item.art] + '</div>';
    }
    return '<div class="thumb"><span class="fallback">\u{1F381}</span></div>';
  }

  function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    updateSyncNote();

    items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'card' + ((syncOn ? item.claimed : item.claimedBy) ? ' claimed' : '');

      let linkHtml = '';
      if (item.link && /^https?:\/\//i.test(item.link)) {
        linkHtml = '<a class="item-link" href="' + esc(item.link) + '" target="_blank" rel="noopener">View article ↗</a>';
      }

      const taken = syncOn ? item.claimed : !!item.claimedBy;
      const mine = taken && !!item.claimedBy;

      let bottom;
      if (mine) {
        bottom = '<div class="claimed-tag"><span class="who">✔ You are buying this</span>' +
                 '<button class="ghost-btn" data-unclaim="' + item.id + '">undo</button></div>';
      } else if (taken) {
        bottom = '<div class="claimed-tag other"><span class="who">\u{1F381} Already reserved</span></div>';
      } else if (claimingId === item.id) {
        bottom = '<form class="claim-form" data-claim-form="' + item.id + '">' +
                 '<input name="guest" placeholder="Your name" aria-label="Your name" required maxlength="40">' +
                 '<button type="submit">Confirm</button></form>';
      } else {
        bottom = '<button class="claim-btn" data-claim="' + item.id + '">\u{1F49D} I’ll buy this</button>';
      }

      card.innerHTML =
        thumbHtml(item) +
        (isHost ? '<button class="remove-btn" data-remove="' + item.id + '" title="Remove article" aria-label="Remove ' + esc(item.name) + '">×</button>' : '') +
        '<div class="card-body">' +
        '<h3>' + esc(item.name) + '</h3>' +
        (item.price ? '<div class="price">' + esc(item.price) + '</div>' : '') +
        (item.note ? '<p class="note">' + esc(item.note) + '</p>' : '') +
        linkHtml + bottom +
        '</div>';

      grid.appendChild(card);
    });

    // Add-article card (host only)
    if (isHost) {
      const add = document.createElement('div');
      add.className = 'card add-card' + (addFormOpen ? ' editing' : '');
      add.id = 'addCard';
      add.innerHTML =
        '<button class="add-open" id="addOpen"><span class="plus">+</span>Add an article</button>' +
        '<form class="add-form' + (addFormOpen ? ' open' : '') + '" id="addForm">' +
        '<div><label for="f-name">Article</label><input id="f-name" required maxlength="80" placeholder="e.g. Night light"></div>' +
        '<div><label for="f-img">Image URL (optional)</label><input id="f-img" type="url" placeholder="https://...jpg"></div>' +
        '<div><label for="f-price">Price (optional)</label><input id="f-price" maxlength="20" placeholder="AED 120"></div>' +
        '<div><label for="f-link">Link (optional)</label><input id="f-link" type="url" placeholder="https://..."></div>' +
        '<div><label for="f-note">Note (optional)</label><input id="f-note" maxlength="100" placeholder="Colour, size, brand..."></div>' +
        '<div class="add-actions"><button type="submit" class="save">Add to the list</button>' +
        '<button type="button" class="cancel" id="addCancel">Cancel</button></div></form>';
      grid.appendChild(add);
    }

    const focusInput = grid.querySelector('.claim-form input');
    if (focusInput) focusInput.focus();
  }

  document.getElementById('grid').addEventListener('click', e => {
    const t = e.target.closest('button');
    if (!t) return;

    if (t.dataset.claim) { claimingId = Number(t.dataset.claim); render(); }
    else if (t.dataset.unclaim) {
      const item = items.find(i => i.id === Number(t.dataset.unclaim));
      if (item && confirm('Free up "' + item.name + '" again?')) doUnclaim(item.id);
    }
    else if (t.dataset.remove) {
      if (!isHost) return;
      const item = items.find(i => i.id === Number(t.dataset.remove));
      if (item && confirm('Remove "' + item.name + '" from the list?')) doRemove(item.id);
    }
    else if (t.id === 'addOpen') {
      addFormOpen = true;
      document.getElementById('addCard').classList.add('editing');
      document.getElementById('addForm').classList.add('open');
      document.getElementById('f-name').focus();
    }
    else if (t.id === 'addCancel') {
      addFormOpen = false;
      document.getElementById('addCard').classList.remove('editing');
      document.getElementById('addForm').classList.remove('open');
    }
  });

  document.getElementById('grid').addEventListener('submit', e => {
    e.preventDefault();

    if (e.target.id === 'addForm') {
      if (!isHost) return;
      const name = document.getElementById('f-name').value.trim();
      if (!name) return;
      addFormOpen = false;
      doAdd({
        name: name,
        price: document.getElementById('f-price').value.trim(),
        link: document.getElementById('f-link').value.trim(),
        note: document.getElementById('f-note').value.trim(),
        img: document.getElementById('f-img').value.trim(),
        art: '',
        claimedBy: ''
      });
    }
    else if (e.target.dataset.claimForm) {
      const guest = e.target.querySelector('input[name="guest"]').value.trim();
      if (!guest) return;
      doClaim(Number(e.target.dataset.claimForm), guest);
    }
  });

  render();
  refresh();
  if (syncOn) setInterval(refresh, 15000);
})();
</script>
